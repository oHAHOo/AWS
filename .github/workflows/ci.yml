name: CI Pipeline

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  id-token: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
  - name: Checkout code
    uses: actions/checkout@v4

  - name: Setup Java 17
    uses: actions/setup-java@v4
    with:
      java-version: '17'
      distribution: 'corretto'

  - name: Cache Gradle packages
    uses: actions/cache@v4
    with:
      path: |
        ~/.gradle/caches
        ~/.gradle/wrapper
      key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
      restore-keys: |
        ${{ runner.os }}-gradle-

  - name: Configure AWS credentials
    uses: aws-actions/configure-aws-credentials@v4
    with:
      role-to-assume: ${{ vars.AWS_ROLE_ARN }}
      aws-region: ${{ vars.AWS_REGION }}

  - name: Run tests
    run: |
      git config core.fileMode true
      chmod +x ./gradlew
      ./gradlew test

  - name: Build JAR
    run: ./gradlew bootJar

  - name: Login to ECR
    uses: aws-actions/amazon-ecr-login@v2

  - name: Build and push Docker image
    run: |
      SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
      IMAGE_URI=${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com/${{ vars.ECR_REPOSITORY }}
      docker build --platform linux/arm64 -t $IMAGE_URI:$SHORT_SHA .
      docker push $IMAGE_URI:$SHORT_SHA
      echo "✅ Pushed: $IMAGE_URI:$SHORT_SHA"
