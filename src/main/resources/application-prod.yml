spring:
  config:
    import: optional:aws-parameterstore:/test/prod/

  cloud:
    aws:
      region:
        static: ap-northeast-2
      s3:
        bucket: test-bucket-ina3700

  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: false
management:
  info:
    env:
      enabled: true

info:
  team-name: ${team-name}